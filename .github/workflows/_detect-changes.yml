---
name: detect-file-changes

on:
  workflow_call:
    outputs:
      rust_changed:
        description: 'True if Rust files changed.'
        value: ${{ jobs.changes.outputs.rust_changed }}
      bold_legacy_changed:
        description: 'True if Bold Legacy or related files changed.'
        value: ${{ jobs.changes.outputs.bold_legacy_changed }}
      changelog_added:
        description: 'New changelog fragments.'
        value: ${{ jobs.changes.outputs.changelog_added }}
      code_changed:
        description: 'True if any file other than CHANGELOG.md or changelog/** changed.'
        value: ${{ jobs.changes.outputs.code_changed }}
      has_prior_success:
        description: 'True if a prior successful CI run exists for this branch.'
        value: ${{ jobs.changes.outputs.has_prior_success }}

permissions:
  contents: read
  actions: read

jobs:
  changes:
    name: Detect file changes
    runs-on: ubuntu-4
    outputs:
      rust_changed: ${{ steps.changed.outputs.rust_any_changed }}
      bold_legacy_changed: ${{ steps.changed.outputs.bold_legacy_any_changed }}
      changelog_added: ${{ steps.changed.outputs.changelog_added_files }}
      code_changed: ${{ steps.changed.outputs.code_any_changed }}
      has_prior_success: ${{ steps.prior-runs.outputs.has_prior_success }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PRIVATE_REPO_PAT || github.token }}
          fetch-depth: 10            # Will cover most PRs
          persist-credentials: true  # In case changed-files requires deeper depth

      - uses: ./.github/actions/init-submodules
        with:
          client-id: ${{ vars.NITRO_CI_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.NITRO_CI_APP_PRIVATE_KEY }}
          pat: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Detect changes
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            rust:
              - 'crates/**'
              - 'contracts/**'
              - 'Makefile'
              - '**.toml'
              - '**/Cargo.lock'
              - '.github/workflows/_rust-tests.yml'
              - '.github/workflows/_detect-changes.yml'
            bold_legacy:
              - 'bold/legacy/**'
              - '.github/workflows/_bold-legacy.yml'
            changelog:
              - 'changelog/**.md'
            code:
              - '**'
              - '!CHANGELOG.md'
              - '!changelog/**'

      - name: Check for prior successful CI runs
        id: prior-runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="${{ github.head_ref }}"
          if [ -z "$branch" ]; then
            echo "has_prior_success=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
            -f "branch=$branch" \
            -f "per_page=100" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | length' 2>/dev/null || echo 0)
          if [ "$count" -gt 0 ]; then
            echo "has_prior_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_prior_success=false" >> "$GITHUB_OUTPUT"
          fi
